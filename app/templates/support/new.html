{% extends "base.html" %}
{% block title %}Create Support Ticket{% endblock %}
{% block content %}
<section class="container section-pad narrow">
  <h1>Create Support Ticket</h1>
  {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
  {% if success %}<p class="alert success">{{ success }}</p>{% endif %}
  <form method="post" action="/support/new" class="card form-grid">
    <label>Subject<input name="subject" type="text" required maxlength="255" /></label>
    <label>Category
      <select name="category">
        <option value="general">General</option>
        <option value="billing">Billing</option>
        <option value="technical">Technical</option>
        <option value="medical-record">Medical Record</option>
      </select>
    </label>
    <label>Priority
      <select name="priority">
        <option value="low">Low</option>
        <option value="normal" selected>Normal</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
    </label>
    <label>Details
      <textarea name="message" rows="6" required></textarea>
    </label>
    <button class="btn-primary" type="submit">Create Ticket</button>
  </form>
</section>
{% endblock %}
