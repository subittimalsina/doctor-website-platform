{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
<section class="container section-pad narrow">
  <p class="kicker">Custom Clinic Page</p>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}
  <p class="summary">{{ page.summary }}</p>
  {% endif %}
  <article class="cms-body">{{ page.body | safe }}</article>
</section>
{% endblock %}
