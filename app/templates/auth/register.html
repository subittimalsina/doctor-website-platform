{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="container section-pad auth-wrap">
  <article class="card auth-card">
    <h1>Create patient account</h1>
    <p>Book appointments, raise support tickets, and use AI guidance.</p>
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    <form method="post" action="/auth/register" class="form-grid">
      <label>Full Name<input type="text" name="full_name" required /></label>
      <label>Email<input type="email" name="email" required /></label>
      <label>Password<input type="password" name="password" required minlength="8" /></label>
      <label>Confirm Password<input type="password" name="confirm_password" required minlength="8" /></label>
      <button class="btn-primary" type="submit">Create Account</button>
    </form>
    <p>Already registered? <a href="/auth/login">Login</a></p>
  </article>
</section>
{% endblock %}
