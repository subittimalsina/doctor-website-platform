{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="container section-pad auth-wrap">
  <article class="card auth-card">
    <h1>Sign in</h1>
    <p>Access patient dashboard or doctor admin panel.</p>
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    <form method="post" action="/auth/login" class="form-grid">
      <label>Email<input type="email" name="email" required /></label>
      <label>Password<input type="password" name="password" required /></label>
      <button class="btn-primary" type="submit">Login</button>
    </form>
    <p>No account? <a href="/auth/register">Create one</a></p>
  </article>
</section>
{% endblock %}
