<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Doctor Website Platform{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/utilities.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  {% include 'partials/nav.html' %}
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>
  {% include 'partials/footer.html' %}
  <script src="/static/js/main.js" defer></script>
  <script src="/static/js/ai-chat.js" defer></script>
  <script src="/static/js/dashboard-tools.js" defer></script>
  <script src="/static/js/form-helpers.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
